<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Window Repair & Glass Replacement Knoxville TN | Cunningham Windows</title>
  <meta name="description" content="Cunningham Windows provides windows, window repair, replacement windows, glass replacement, screens, doors, and exterior services in Knoxville and East Tennessee. Call (865) 522-0800 for an estimate." />
  <meta name="keywords" content="window repair Knoxville TN, glass replacement Knoxville, replacement windows Knoxville, window screens Knoxville, door installation Knoxville, door repair Knoxville, Cunningham Windows" />

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

  <style>
    :root {
      --cw-orange: #ff8200;
      --cw-dark: #111827;
      --cw-soft: #f6f7f9;
    }

    body {
      background: #fff;
    }

    .hero {
      background:
        radial-gradient(900px 500px at 15% 0%, rgba(13,110,253,.25), transparent 60%),
        radial-gradient(800px 520px at 85% 10%, rgba(255,130,0,.18), transparent 55%),
        #0b1220;
      color: #fff;
    }

    .glass-panel {
      background: rgba(255,255,255,.08);
      border: 1px solid rgba(255,255,255,.14);
      backdrop-filter: blur(10px);
    }

    .eyebrow {
      color: var(--cw-orange);
      font-weight: 700;
      letter-spacing: .08em;
      text-transform: uppercase;
      font-size: .85rem;
    }

    .card-hover {
      transition: transform .15s ease, box-shadow .15s ease;
    }

    .card-hover:hover {
      transform: translateY(-2px);
      box-shadow: 0 1rem 2rem rgba(0,0,0,.15);
    }

    .service-icon {
      width: 52px;
      height: 52px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border-radius: 1rem;
      background: rgba(255,130,0,.12);
      color: var(--cw-orange);
      font-size: 1.6rem;
    }

    .trust-strip {
      background: #0f172a;
      color: #fff;
    }

    .trust-strip .stat {
      border-right: 1px solid rgba(255,255,255,.14);
    }

    .trust-strip .stat:last-child {
      border-right: 0;
    }

    .bg-windows,
    .bg-doors {
      min-height: 620px;
      display: flex;
      align-items: center;
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      color: #fff;
    }

    .bg-windows {
      background-image:
        linear-gradient(rgba(0,0,0,.58), rgba(0,0,0,.58)),
        url("images/window_hero.jpg");
    }

    .bg-doors {
      background-image:
        linear-gradient(rgba(0,0,0,.6), rgba(0,0,0,.6)),
        url("images/projects/doorsMain.png");
    }

    .content-card {
      max-width: 720px;
      background: rgba(8,13,24,.76);
      border: 1px solid rgba(255,255,255,.16);
      border-radius: 1.25rem;
      padding: clamp(1.5rem, 3vw, 2.5rem);
      box-shadow: 0 1rem 2rem rgba(0,0,0,.25);
    }

    .content-card p,
    .content-card li {
      color: rgba(255,255,255,.82);
    }

    .glass-image {
      width: 100%;
      min-height: 360px;
      object-fit: cover;
      border-radius: 1.25rem;
      box-shadow: 0 1rem 2rem rgba(15,23,42,.16);
    }

    .review-card {
      border: 0;
      border-radius: 1.25rem;
      box-shadow: 0 1rem 2rem rgba(15,23,42,.1);
    }

    .review-stars {
      color: #ffc107;
      letter-spacing: .08em;
    }

    .map-frame {
      width: 100%;
      min-height: 380px;
      border: 0;
      border-radius: 1.25rem;
      box-shadow: 0 1rem 2rem rgba(15,23,42,.12);
    }

    .file-help {
      font-size: .875rem;
      color: #6c757d;
    }

    .form-success {
      display: none;
      background: #dcfce7;
      border: 1px solid #86efac;
      color: #166534;
      border-radius: 1rem;
      padding: 1rem 1.25rem;
      margin-bottom: 1.25rem;
      font-weight: 600;
    }
  </style>
</head>
<body>

<div id="site-nav"></div>

<section id="contact" class="py-5">
  <div class="container">
    <div class="row g-4 align-items-start">
      <div class="col-lg-5">
        <p class="eyebrow mb-2">Contact</p>
        <h2 class="fw-bold">Request an estimate</h2>
      </div>

      <div class="col-lg-7">
        <div class="card shadow-sm border-0">
          <div class="card-body p-4">

            <div id="formSuccess" class="form-success">
              <i class="bi bi-check-circle-fill me-2"></i>
              Thanks! We received your request and will contact you as soon as possible.
            </div>

            <form id="contactForm" class="row g-3">
              <div class="col-md-6">
                <label class="form-label">Name</label>
                <input class="form-control" name="name" autocomplete="name" required>
              </div>

              <div class="col-md-6">
                <label class="form-label">Phone</label>
                <input class="form-control" name="phone" autocomplete="tel" required>
              </div>

              <div class="col-md-6">
                <label class="form-label">Email</label>
                <input class="form-control" type="email" name="email" autocomplete="email">
              </div>

              <div class="col-md-6">
                <label class="form-label">Service Needed</label>
                <select class="form-select" name="service">
                  <option>Windows</option>
                  <option>Glass Service</option>
                  <option>Doors</option>
                  <option>Other</option>
                </select>
              </div>

              <div class="col-12">
                <label class="form-label">Upload a Photo (optional)</label>
                <input id="projectPhoto" class="form-control" type="file" name="photo" accept="image/jpeg,image/png,image/webp">
                <div class="file-help mt-1">Accepted: JPG, PNG, WEBP • Max size 5MB</div>
              </div>

              <div class="col-12">
                <label class="form-label">Message</label>
                <textarea class="form-control" name="message" rows="5"></textarea>
              </div>

              <div class="col-12 d-flex gap-2 flex-wrap">
                <button id="submitBtn" class="btn btn-primary btn-lg" type="submit">
                  <i class="bi bi-send me-1"></i> Send Request
                </button>

                <a class="btn btn-outline-secondary btn-lg" href="tel:+18655220800">
                  <i class="bi bi-telephone me-1"></i> Call Instead
                </a>
              </div>
            </form>
          </div>
        </div>
      </div>
    </div>
  </div>
</section>

<div id="site-footer"></div>

<script src="assets/js/site.js"></script>

<script>
const form = document.getElementById("contactForm");
const submitBtn = document.getElementById("submitBtn");
const successMessage = document.getElementById("formSuccess");
const maxUploadSize = 5 * 1024 * 1024;

function fileToBase64(file) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = () => {
      const result = String(reader.result || "");
      resolve(result.split(",")[1] || "");
    };
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}

form?.addEventListener("submit", async (e) => {
  e.preventDefault();

  successMessage.style.display = "none";

  submitBtn.disabled = true;
  submitBtn.innerHTML = 'Sending...';

  const data = Object.fromEntries(new FormData(form).entries());
  const photo = document.getElementById("projectPhoto")?.files?.[0];

  try {
    if (photo) {
      if (photo.size > maxUploadSize) {
        throw new Error("Please upload an image smaller than 5MB.");
      }

      data.attachment = {
        filename: photo.name,
        contentType: photo.type,
        content: await fileToBase64(photo)
      };
    }

    delete data.photo;

    const res = await fetch("https://lively-river-3bf0.cloverhillking77.workers.dev", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify(data)
    });

    if (!res.ok) {
      throw new Error("Form submission failed.");
    }

    form.reset();

    successMessage.style.display = "block";

    window.scrollTo({
      top: form.offsetTop - 140,
      behavior: "smooth"
    });

  } catch (err) {
    alert(err.message || "Something went wrong.");
  } finally {
    submitBtn.disabled = false;
    submitBtn.innerHTML = '<i class="bi bi-send me-1"></i> Send Request';
  }
});
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
