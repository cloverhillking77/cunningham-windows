<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Projects | Cunningham Windows</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
<style>
body{background:#f6f7f9}
.carousel img{height:520px;object-fit:contain;background:#000;cursor:pointer}
.project-caption{background:rgba(0,0,0,.65);padding:.75rem 1rem;border-radius:.5rem}
</style>
</head>
<body>

<nav class="navbar navbar-dark bg-dark">
<div class="container">
<a class="navbar-brand" href="index.html">Cunningham Windows</a>
</div>
</nav>

<section class="py-5">
<div class="container">
<h2 class="fw-bold mb-4">Project Gallery</h2>
<div id="projectSliders" class="vstack gap-5"></div>
</div>
</section>

<!-- Lightbox -->
<div class="modal fade" id="lightboxModal" tabindex="-1">
  <div class="modal-dialog modal-dialog-centered modal-xl">
    <div class="modal-content bg-dark">
      <div class="modal-body text-center">
        <img id="lightboxImg" class="img-fluid">
      </div>
    </div>
  </div>
</div>

<script>
async function loadImages(){
  const res = await fetch("https://api.github.com/repos/cloverhillking77/cunningham-windows/contents/images/projects");
  const files = await res.json();

  const images = files
    .map(f => f.name)
    .filter(name => /\.(jpg|jpeg|png|webp)$/i.test(name));

  const groups = [];
  for(let i=0;i<images.length;i+=4){
    groups.push(images.slice(i,i+4));
  }

  const container = document.getElementById("projectSliders");

  container.innerHTML = groups.map((group,gi)=>{
    const id = "carousel"+gi;

    return `
    <div class="card shadow-sm">
      <div class="card-body">
        <h5 class="fw-bold">Project ${gi+1}</h5>
        <div id="${id}" class="carousel slide">
          <div class="carousel-inner">
            ${group.map((img,i)=>`
              <div class="carousel-item ${i===0?'active':''}">
                <img src="images/projects/${img}" onclick="openLightbox(this.src)">
              </div>
            `).join('')}
          </div>
          <button class="carousel-control-prev" data-bs-target="#${id}" data-bs-slide="prev"><span class="carousel-control-prev-icon"></span></button>
          <button class="carousel-control-next" data-bs-target="#${id}" data-bs-slide="next"><span class="carousel-control-next-icon"></span></button>
        </div>
      </div>
    </div>`;
  }).join('');
}

function openLightbox(src){
  document.getElementById('lightboxImg').src = src;
  new bootstrap.Modal(document.getElementById('lightboxModal')).show();
}

loadImages();
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
